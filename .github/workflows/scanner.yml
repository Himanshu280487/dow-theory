name: Dow Theory Scanner

on:
  schedule:
    - cron: "30 16 * * 1-5"   # 10:00 PM IST Mon-Fri
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requirements
        run: |
          pip install -r requirements.txt

      - name: Run Scanner
        run: |
          python scanner.py
